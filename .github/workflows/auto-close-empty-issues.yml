name: Auto-close empty template issues

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  issues: write

jobs:
  close-empty-issues:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const now = new Date();
            const cutoff = new Date(now.getTime() - 24 * 60 * 60 * 1000); // 24h ago

            // Fetch open issues with relevant labels
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 50,
            });

            for (const issue of issues) {
              // Skip PRs
              if (issue.pull_request) continue;

              // Only process issues older than 24h
              const createdAt = new Date(issue.created_at);
              if (createdAt > cutoff) continue;

              // Only process issues with these labels
              const labels = issue.labels.map(l => l.name);
              if (!labels.includes('新增技能') && !labels.includes('提交实践')) continue;

              const body = issue.body || '';

              // Check if this is an empty template submission
              const isEmpty = isEmptyTemplate(body, labels);

              if (isEmpty) {
                console.log(`Closing empty template issue #${issue.number}: ${issue.title}`);

                // Add comment
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: [
                    '👋 您好！',
                    '',
                    '此 issue 在创建超过 24 小时后，必填信息仍未填写（GitHub 仓库、实践标题、实践链接等），系统自动关闭。',
                    '',
                    '如果您确实想推荐 skill 或实践，欢迎重新提交并填写完整信息 🙏',
                    '',
                    '---',
                    '*此操作由 GitHub Actions 自动执行*',
                  ].join('\n'),
                });

                // Close the issue
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  state: 'closed',
                  state_reason: 'not_planned',
                });
              }
            }

            function isEmptyTemplate(body, labels) {
              if (!body.trim()) return true;

              if (labels.includes('新增技能')) {
                // Required fields for skill recommendation
                const repoMatch = body.match(/\*\*GitHub仓库\*\*[^:]*:\s*(.*)/);
                const titleMatch = body.match(/\*\*实践标题\*\*[^:]*:\s*(.*)/);
                const descMatch = body.match(/\*\*实践简介\*\*[^:]*:\s*(.*)/);
                const linkMatch = body.match(/\*\*实践链接\*\*[^:]*:\s*(.*)/);

                const repo = repoMatch ? repoMatch[1].trim() : '';
                const title = titleMatch ? titleMatch[1].trim() : '';
                const desc = descMatch ? descMatch[1].trim() : '';
                const link = linkMatch ? linkMatch[1].trim() : '';

                // Empty if GitHub repo AND all practice fields are empty
                return !repo && !title && !desc && !link;
              }

              if (labels.includes('提交实践')) {
                // Required fields for practice submission
                const skillMatch = body.match(/\*\*skill名称\/ID\*\*[^:]*:\s*(.*)/);
                const titleMatch = body.match(/\*\*实践标题\*\*[^:]*:\s*(.*)/);
                const descMatch = body.match(/\*\*实践简介\*\*[^:]*:\s*(.*)/);
                const linkMatch = body.match(/\*\*实践链接\*\*[^:]*:\s*(.*)/);

                const skill = skillMatch ? skillMatch[1].trim() : '';
                const title = titleMatch ? titleMatch[1].trim() : '';
                const desc = descMatch ? descMatch[1].trim() : '';
                const link = linkMatch ? linkMatch[1].trim() : '';

                return !skill && !title && !desc && !link;
              }

              return false;
            }
